name: Build and Deploy LearnerOps LMS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  PUBLISH_DIR: './publish'
  PACKAGE_PATH: './learneropslms-github.zip'

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build application
        run: dotnet build --configuration Release --no-restore

      - name: Publish application
        run: dotnet publish --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Create deployment package
        run: |
          cd ${{ env.PUBLISH_DIR }}
          zip -r ../learneropslms-github.zip .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: learneropslms-package
          path: ${{ env.PACKAGE_PATH }}

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: learneropslms-package

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to DEV App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_DEV }}
          package: learneropslms-github.zip

  deploy-test1:
    name: Deploy to TEST1
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: test1

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: learneropslms-package

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to TEST1 App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_TEST1 }}
          package: learneropslms-github.zip

  deploy-test2:
    name: Deploy to TEST2
    runs-on: ubuntu-latest
    needs: deploy-test1
    environment: test2

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: learneropslms-package

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to TEST2 App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_TEST2 }}
          package: learneropslms-github.zip